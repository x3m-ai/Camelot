title: "[Q&A] "
labels: []
body:
  - type: dropdown
    id: product
    attributes:
      label: Product
      description: Which product is this question about?
      options:
        - Merlino (Excel Add-in)
        - Morgana Arsenal (Red Team)
        - Both / General
    validations:
      required: true
  - type: textarea
    id: question
    attributes:
      label: Your Question
      description: Describe your question clearly. Include steps you have already tried.
      placeholder: I am trying to... but...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Your setup details (optional but helpful)
      placeholder: |
        OS: Windows 11
        Excel: Microsoft 365
        Merlino: v1.4.0
    validations:
      required: false

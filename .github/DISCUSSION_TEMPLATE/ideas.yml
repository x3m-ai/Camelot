title: "[Idea] "
labels: []
body:
  - type: dropdown
    id: product
    attributes:
      label: Product
      description: Which product is this idea for?
      options:
        - Merlino (Excel Add-in)
        - Morgana Arsenal (Red Team)
        - Both / Ecosystem
    validations:
      required: true
  - type: textarea
    id: idea
    attributes:
      label: Your Idea
      description: Describe the feature or improvement you would like to see.
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem It Solves
      description: What problem or limitation does this address?
    validations:
      required: false
